<div class="nl-zone">
  <div class="input-label mono">// just type naturally — AI will figure it out</div>

  <div class="nl-row">
    <input
      type="text"
      class="nl-input"
      [(ngModel)]="text"
      (keydown)="onKeyDown($event)"
      placeholder="e.g. 'Call Ravi about Q2 budget tomorrow 3pm, high priority'"
      [disabled]="loading()"
    />
    <button class="add-btn" (click)="submit()" [disabled]="loading() || !text.trim()">
      <span *ngIf="!loading()">✦ Add</span>
      <span *ngIf="loading()" class="spinner">...</span>
    </button>
  </div>

  <div class="nl-footer">
    <div class="ai-indicator">
      <div class="ai-dot"></div>
      AI agent active · parsing NL · auto-prioritizing
    </div>
    <div class="error-msg" *ngIf="error()">{{ error() }}</div>
  </div>
</div>
